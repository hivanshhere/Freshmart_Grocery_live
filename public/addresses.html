<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Addresses</title>
<link rel="stylesheet" href="cartstyle.css">
</head>
<body>

<header class="main-header">
<h1>My Addresses</h1>
<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="stores.html">Stores</a>
<a href="cart.html">Cart</a>
<a href="#" data-nav="logout" style="display:none;">Logout</a>
</nav>
</header>

<main class="addresses-page">
    <section class="addresses-hero">
        <p class="addresses-hero__eyebrow">Delivery details</p>
        <h2>Manage saved addresses</h2>
        <p>Keep your home, work, and other delivery locations ready so checkout stays quick and clean.</p>
    </section>

    <section class="addresses-layout">
        <section class="addresses-panel">
            <div class="addresses-panel__header">
                <div>
                    <p class="addresses-panel__eyebrow">Saved locations</p>
                    <h3>Saved Addresses</h3>
                </div>
            </div>
            <div id="addressList" class="address-list"></div>
        </section>

        <section class="addresses-panel addresses-panel--form">
            <div class="addresses-panel__header">
                <div>
                    <p class="addresses-panel__eyebrow">Add or update</p>
                    <h3>Add new address</h3>
                </div>
            </div>

            <div class="cart-checkout__row">
                <label for="addressType">Type</label>
                <select id="addressType">
                    <option value="Home">Home</option>
                    <option value="Work">Work</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="address-form__grid">
                <div>
                    <label for="customerName">Name</label>
                    <input id="customerName" class="address-uppercase" type="text" placeholder="Your name" autocomplete="name" required maxlength="100">
                </div>

                <div>
                    <label for="phone">Phone</label>
                    <input id="phone" type="tel" placeholder="Mobile number" autocomplete="tel" required inputmode="numeric" pattern="[0-9]{10}" maxlength="10">
                </div>

                <div>
                    <label for="house">House / Flat</label>
                    <input id="house" class="address-uppercase" type="text" placeholder="House no, flat, building" autocomplete="address-line1" required maxlength="120">
                </div>

                <div>
                    <label for="area">Area / Street</label>
                    <input id="area" class="address-uppercase" type="text" placeholder="Street, area" autocomplete="address-line2" required maxlength="160">
                </div>

                <div>
                    <label for="landmark">Landmark (optional)</label>
                    <input id="landmark" class="address-uppercase" type="text" placeholder="Near..." maxlength="160">
                </div>

                <div>
                    <label for="city">City</label>
                    <input id="city" class="address-uppercase" type="text" placeholder="City" autocomplete="address-level2" required maxlength="80">
                </div>

                <div>
                    <label for="pincode">Pincode</label>
                    <input id="pincode" type="text" placeholder="Pincode" inputmode="numeric" autocomplete="postal-code" required pattern="[0-9]{6}" minlength="6" maxlength="6">
                </div>
            </div>

            <div class="address-form__actions">
                <button class="cart-checkout-btn address-submit-btn" type="button" onclick="saveAddress()">Save Address</button>
            </div>
        </section>
    </section>
</main>

<p id="msg" class="cart-msg address-msg"></p>

<script src="nav.js"></script>
<script src="addresses.js"></script>

</body>
</html>
