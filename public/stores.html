<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Grocery Stores</title>
    <link rel="stylesheet" href="storestyle.css">
</head>
<body>

<header class="main-header">
    <h1>FreshMart Grocery</h1>
    <nav class="nav-menu">
        <a href="index.html">Home</a>
        <a href="cart.html">Cart</a>
        <a href="customer-orders.html" data-nav="customer-orders" style="display:none;">Orders</a>
        <a href="login.html">Login</a>
        <a href="addresses.html" data-nav="addresses" style="display:none;">Addresses</a>
        <a href="#" data-nav="logout" style="display:none;">Logout</a>
    </nav>
</header>

<main class="stores-page">
    <section class="stores-hero">
        <p class="stores-hero__eyebrow">Choose your store</p>
        <h2>Nearby Grocery Stores</h2>
        <p>Browse nearby stores, compare delivery and pickup availability, and open the one you want to shop from.</p>
    </section>

    <section class="store-container stores-grid" id="storeList">
        <!-- Stores will be loaded here -->
    </section>
</main>

<script>

// Login check: only logged-in users can access stores
(function requireLogin(){
    const userId = localStorage.getItem("userId");
    const role = localStorage.getItem("userRole");

    if (!userId) {
        localStorage.setItem("afterLogin", "stores.html");
        window.location.href = "login.html";
        return;
    }

    // Redirect owner to dashboard
    if (role === "owner") {
        window.location.href = "owner-dashboard.html";
        return;
    }
})();


// Fetch stores on page load
window.onload = function () {

    const container = document.getElementById("storeList");
    if (!container) return;

    fetch("http://localhost:3000/stores")
    .then(res => res.json())
    .then(data => {

        if (!data || data.length === 0) {
            container.innerHTML = `
                <div class="store-card store-card--empty">
                    <h2>No stores available</h2>
                    <p>Check back soon. New stores will appear here once they are added.</p>
                </div>
            `;
            return;
        }

        container.innerHTML = "";

        data.forEach(store => {

            let div = document.createElement("div");
            div.classList.add("store-card");

            div.innerHTML = `
                <h2 class="store-card__title">${store.store_name}</h2>
                <p class="store-card__rating">4.2 rating &bull; Nearby</p>
                <div class="store-card__badges">
                    <span class="store-badge ${store.delivery_available ? "store-badge--on" : "store-badge--off"}">Delivery ${store.delivery_available ? "On" : "Off"}</span>
                    <span class="store-badge ${store.pickup_available ? "store-badge--on" : "store-badge--off"}">Pickup ${store.pickup_available ? "On" : "Off"}</span>
                </div>
                ${store.delivery_available ? `
                    <p class="store-card__meta">
                        Delivery fee: ₹${Number(store.delivery_charge || 0)} &bull; Free above ₹${Number(store.min_order_free_delivery || 0)}
                    </p>
                ` : ""}
            `;

            const btn = document.createElement("button");
            btn.type = "button";
            btn.innerText = "View Store";
            btn.classList.add("store-card__button");
            btn.onclick = () => openStore(store.id, store.store_name);
            div.appendChild(btn);

            container.appendChild(div);

        });

    })
    .catch(err => {
        console.log(err);
        container.innerHTML = `
            <div class="store-card store-card--empty">
                <h2>Error loading stores</h2>
                <p>Please refresh the page and try again.</p>
            </div>
        `;
    });

};


// Open selected store
function openStore(id, name) {

    // Save store details
    localStorage.setItem("storeId", id);
    localStorage.setItem("storeName", name);

    // Redirect with storeId in URL
    window.location.href = "store-products.html?storeId=" + id;
}

</script>

<script src="nav.js"></script>

</body>
</html>
