<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Grocery Stores</title>
    <link rel="stylesheet" href="storestyle.css">
</head>
<body>

<header class="main-header">
    <h1>FreshMart Grocery</h1>
    <nav class="nav-menu">
        <a href="index.html">Home</a>
        <a href="customer-orders.html" data-nav="customer-orders" style="display:none;">Orders</a>
        <a href="owner-dashboard.html" data-nav="owner-dashboard" style="display:none;">Owner Panel</a>
        <a href="admin-dashboard.html" data-nav="admin-dashboard" style="display:none;">Admin Panel</a>
        <a href="login.html" data-nav="login">Login</a>
        <a href="addresses.html" data-nav="addresses" style="display:none;">Addresses</a>
        <a href="cart.html">Cart</a>
        <a href="#" data-nav="logout" style="display:none;">Logout</a>
    </nav>
</header>

<main class="stores-page">
    <section class="stores-hero">
        <p class="stores-hero__eyebrow">Choose your store</p>
        <h2>Nearby Grocery Stores</h2>
        <p>Browse nearby stores, compare delivery and pickup availability, and open the one you want to shop from.</p>
    </section>

    <section id="customerAccountWarning" class="store-account-warning" style="display:none;"></section>
    <section id="customerReviewMessages" class="store-account-review" style="display:none;"></section>

    <section class="stores-status" id="locationStatus">
        Finding all the stores near you...
    </section>

    <section class="store-container stores-grid" id="storeList">
        <!-- Stores will be loaded here -->
    </section>
</main>

<script src="auth.js"></script>
<script>

// Login check: only logged-in users can access stores
(async function requireLogin(){
    if (!window.AppAuth?.validateCurrentSession) return;
    const session = await window.AppAuth.validateCurrentSession({
        expectedRole: "customer",
        afterLogin: "stores.html"
    });
    showCustomerWarning(session?.user, session?.warning_actions || []);
    showCustomerReviewMessages(session?.moderation_reports || []);
})();

function escapeWarningHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function getWarningText(warning) {
    return String(warning?.notes || warning?.admin_notes || warning?.message || "").trim();
}

function showCustomerWarning(profile, warningActions) {
    const warningEl = document.getElementById("customerAccountWarning");
    if (!warningEl) return;

    const status = String(profile?.account_status || localStorage.getItem("accountStatus") || "active").toLowerCase();
    const warningCount = Number(profile?.warning_count ?? localStorage.getItem("warningCount") ?? 0);
    const banReason = String(profile?.ban_reason || localStorage.getItem("banReason") || "").trim();
    const warnings = Array.isArray(warningActions)
        ? warningActions.filter((warning) => getWarningText(warning))
        : [];

    if (status !== "warned" && warningCount <= 0 && !banReason && warnings.length === 0) {
        warningEl.style.display = "none";
        warningEl.innerHTML = "";
        return;
    }

    const warningItems = warnings.length
        ? warnings.map((warning) => `
            <div class="store-account-warning__item">
                <span>Warning Message</span>
                <strong>${escapeWarningHtml(getWarningText(warning))}</strong>
            </div>
        `).join("")
        : `
            <div class="store-account-warning__item">
                <span>Warning Message</span>
                <strong>${escapeWarningHtml(banReason || "Please review your recent activity and follow the platform rules to avoid stronger action.")}</strong>
            </div>
        `;

    warningEl.style.display = "block";
    warningEl.innerHTML = `
        <details class="store-account-warning__details">
            <summary>Warning${warningCount > 1 ? ` (${warningCount})` : ""}</summary>
            <p>This is a warning from the admin. Please read the exact message below.</p>
            ${warningItems}
        </details>
    `;
}

function showCustomerReviewMessages(moderationReports) {
    const reviewEl = document.getElementById("customerReviewMessages");
    if (!reviewEl) return;

    const reviewMessages = Array.isArray(moderationReports)
        ? moderationReports.filter((report) => {
            const isReview = String(report.report_type || "").toLowerCase() === "review";
            const isMessage = String(report.resolution_action || "").toLowerCase() === "message";
            return isReview && isMessage && String(report.admin_notes || "").trim();
        })
        : [];

    if (!reviewMessages.length) {
        reviewEl.style.display = "none";
        reviewEl.innerHTML = "";
        return;
    }

    reviewEl.style.display = "block";
    reviewEl.innerHTML = `
        <details class="store-account-review__details">
            <summary>Review${reviewMessages.length > 1 ? ` (${reviewMessages.length})` : ""}</summary>
            <p>Please read the exact review message sent by the admin.</p>
            ${reviewMessages.map((report) => `
                <div class="store-account-review__item">
                    <span>Review Message</span>
                    <strong>${escapeWarningHtml(report.admin_notes)}</strong>
                </div>
            `).join("")}
        </details>
    `;
}

// Fetch stores on page load
window.onload = function () {
    const statusBox = document.getElementById("locationStatus");
    const container = document.getElementById("storeList");
    if (!container || !statusBox) return;

    if (!navigator.geolocation) {
        statusBox.innerText = "Location is not supported in this browser.";
        showEmptyState("Location is required", "Please use a browser that supports location access.");
        return;
    }

    navigator.geolocation.getCurrentPosition(loadNearbyStores, handleLocationError, {
        enableHighAccuracy: true,
        timeout: 10000
    });

    function loadNearbyStores(position) {
        const latitude = position.coords.latitude;
        const longitude = position.coords.longitude;

        statusBox.innerText = "Showing stores near you.";

        const apiBase = window.AppAuth?.API_BASE || window.location.origin;
        fetch(`${apiBase}/stores?latitude=${latitude}&longitude=${longitude}`)
        .then(async res => {
            const data = await res.json().catch(() => []);
            if (!res.ok) {
                throw new Error(data.message || "Could not load nearby stores");
            }
            return data;
        })
        .then(data => {
            if (!data || data.length === 0) {
                showEmptyState("No nearby stores found", "No stores are available within 5 km of your current location.");
                return;
            }

            container.innerHTML = "";

            data.forEach(store => {
                let div = document.createElement("div");
                div.classList.add("store-card");

                div.innerHTML = `
                    <h2 class="store-card__title">${store.store_name}</h2>
                    <p class="store-card__rating">${Number(store.distance_km || 0).toFixed(2)} km away</p>
                    <div class="store-card__badges">
                        <span class="store-badge ${store.delivery_available ? "store-badge--on" : "store-badge--off"}">Delivery ${store.delivery_available ? "On" : "Off"}</span>
                        <span class="store-badge ${store.pickup_available ? "store-badge--on" : "store-badge--off"}">Pickup ${store.pickup_available ? "On" : "Off"}</span>
                    </div>
                    ${store.delivery_available ? `
                        <p class="store-card__meta">
                            Delivery fee: Rs. ${Number(store.delivery_charge || 0)} &bull; Free above Rs. ${Number(store.min_order_free_delivery || 0)}
                        </p>
                    ` : ""}
                `;

                const btn = document.createElement("button");
                btn.type = "button";
                btn.innerText = "View Store";
                btn.classList.add("store-card__button");
                btn.onclick = () => openStore(store.id, store.store_name);
                div.appendChild(btn);

                container.appendChild(div);
            });
        })
        .catch(err => {
            console.log(err);
            statusBox.innerText = "Could not load nearby stores right now.";
            showEmptyState("Error loading stores", "Please refresh the page and try again.");
        });
    }

    function handleLocationError() {
        statusBox.innerText = "Location access was not allowed.";
        showEmptyState("Location permission needed", "Please allow location access so we can show stores within 5 km of you.");
    }

    function showEmptyState(title, text) {
        container.innerHTML = `
            <div class="store-card store-card--empty">
                <h2>${title}</h2>
                <p>${text}</p>
            </div>
        `;
    }
};


// Open selected store
function openStore(id, name) {

    // Save store details
    localStorage.setItem("storeId", id);
    localStorage.setItem("storeName", name);

    // Redirect with storeId in URL
    window.location.href = "store-products.html?storeId=" + id;
}

</script>

<script src="nav.js"></script>

</body>
</html>
