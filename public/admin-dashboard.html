<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="orders.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<header class="main-header">
    <h1>Admin Dashboard</h1>
    <nav class="nav-menu">
        <a href="index.html">Home</a>
        <a href="stores.html">Stores</a>
        <a href="admin-complaints.html">All Complaints</a>
        <a href="#" id="adminLogoutBtn">Logout</a>
    </nav>
</header>

<main class="admin-shell">
    <section class="admin-hero">
        <div>
            <p class="admin-hero__eyebrow">Platform control</p>
            <h2>Monitor store owners and customers</h2>
            <!-- <p>Review platform users separately so store accounts and customer accounts stay easy to identify.</p> -->
            <a class="orders-btn orders-btn--primary admin-hero__button" href="admin-complaints.html">All Complaints</a>
        </div>
    </section>

    <div id="adminFeedback"></div>

    <section class="orders-summary" id="adminSummary"></section>

    <section class="admin-grid">
        <div class="admin-panel">
            <div class="admin-panel__header">
                <h3>Store Owners</h3>
            </div>
            <div class="admin-panel__body" id="adminOwnersList"></div>
        </div>

        <div class="admin-panel">
            <div class="admin-panel__header">
                <h3>Customers</h3>
            </div>
            <div class="admin-panel__body" id="adminCustomersList"></div>
        </div>
    </section>
</main>

<script src="admin-dashboard.js"></script>
</body>
</html>
