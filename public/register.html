<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Register</title>
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="login.css">
</head>
<body>

<header>
	<h1>FreshMart Grocery</h1>
	<nav>
		<a href="index.html">Home</a>
		<a href="cart.html">Cart</a>
		<a href="login.html">Login</a>
	</nav>
</header>

<main class="login-main">
	<section class="login-card" aria-label="Registration form">
		<div class="login-card__accent" aria-hidden="true"></div>
		<h2 class="login-title">Create account</h2>
		<p class="login-subtitle">Register as a customer or as a store owner.</p>

		<form class="login-form" id="registerForm" onsubmit="event.preventDefault(); registerUser();" novalidate>
			<label class="login-label" for="role">Register as</label>
			<select id="role" required onchange="onRoleChange()">
				<option value="customer" selected>Customer</option>
				<option value="owner">Store Owner</option>
			</select>

			<label class="login-label" for="name">Name</label>
			<input
				type="text"
				id="name"
				placeholder="Enter name"
				autocomplete="name"
				required
				minlength="2"
				maxlength="50"
				pattern="^[A-Za-z][A-Za-z .'-]{1,49}$"
			>

			<label class="login-label" for="email">Email</label>
			<input
				type="email"
				id="email"
				placeholder="Enter email"
				autocomplete="email"
				required
			>

			<label class="login-label" for="password">Password</label>
			<input
				type="password"
				id="password"
				placeholder="Enter password"
				autocomplete="new-password"
				required
				minlength="6"
			>

			<div id="ownerFields" style="display:none;">
				<label class="login-label" for="storeName">Store Name</label>
				<input
					type="text"
					id="storeName"
					placeholder="e.g. Sharma Store"
					autocomplete="organization"
					minlength="2"
					maxlength="80"
					pattern="^[A-Za-z0-9][A-Za-z0-9 &.-]{1,79}$"
				>
			</div>

			<button type="submit">Register</button>
			<p style="margin:8px 0 0; font-size:14px;">
				Already have an account? <a href="login.html">Login</a>
			</p>
			<p id="msg" role="status" aria-live="polite"></p>
		</form>
	</section>
</main>

<script src="register.js"></script>
</body>
</html>
