<!DOCTYPE html>
<html>
<head>
    <title>Order Placed</title>
    <link rel="stylesheet" href="cartstyle.css">
</head>
<body>

<header class="main-header">
    <h1>Order Status</h1>
    <nav class="nav-menu">
        <a href="index.html">Home</a>
        <a href="stores.html">Stores</a>
        <a href="addresses.html" data-nav="addresses" style="display:none;">Addresses</a>
        <a href="cart.html">Cart</a>
    </nav>
</header>

<main class="order-placed-wrap">
    <section class="order-placed-card" aria-label="Order placed confirmation">
        <h2 class="order-placed-title">Order Placed</h2>
        <p class="order-placed-subtitle">Thank You</p>
        <button type="button" class="order-again-btn" id="orderAgainBtn">Order Again</button>
    </section>
</main>

<script src="nav.js"></script>

<script>
    (function setupOrderAgain(){
        const btn = document.getElementById("orderAgainBtn");
        if (!btn) return;

        const params = new URLSearchParams(window.location.search);
        const storeId = params.get("storeId");
        const storeName = params.get("storeName");

        btn.onclick = function(){
            if (storeId) {
                localStorage.setItem("storeId", storeId);
                if (storeName) localStorage.setItem("storeName", storeName);
                window.location.href = "store-products.html?storeId=" + encodeURIComponent(storeId);
                return;
            }

            window.location.href = "stores.html";
        };
    })();
</script>

</body>
</html>
