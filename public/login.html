<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login</title>
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="login.css">
</head>
<body>

<header>
	<h1>FreshMart Grocery</h1>
	<nav>
		<a href="index.html">Home</a>
		<a href="login.html">Login</a>
	</nav>
</header>

<main class="login-main">
	<section class="login-card" aria-label="Login form">
		<div class="login-card__accent" aria-hidden="true"></div>
		<h2 class="login-title">Welcome back</h2>
		<p class="login-subtitle">Login to continue shopping from your local store.</p>

		<form class="login-form" onsubmit="event.preventDefault(); login();">
			<label class="login-label" for="email">Email</label>
			<input type="text" id="email" placeholder="Enter email" autocomplete="email" inputmode="email">

			<label class="login-label" for="password">Password</label>
			<input type="password" id="password" placeholder="Enter password" autocomplete="current-password">

			<button type="submit">Login</button>
			<p style="margin:8px 0 0; font-size:14px;">
				New user? <a href="register.html">Register here</a>
			</p>
			<p id="msg" role="status" aria-live="polite"></p>
		</form>
	</section>
</main>

<script src="login.js"></script>

</body>
</html>
