<!DOCTYPE html>
<html lang="en">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Owner Dashboard</title>
	<link rel="stylesheet" href="storestyle.css">
	<link rel="stylesheet" href="owner.css">
</head>
<body>

<header class="main-header">
<h1>Store Owner Panel</h1>
<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="#" onclick="logout()">Logout</a>
</nav>
</header>

<main class="dashboard">
	<h2 class="dashboard-title">Manage your store</h2>

		<section class="dashboard-grid">

			<!-- STORE INFO -->
			<div class="panel-card">
				<div class="panel-card__header">
					<h2>My Store</h2>
				</div>
				<div class="panel-card__body">
					<p><strong>Store:</strong> <span id="storeDisplayName">Loading…</span></p>
					<p><strong>Store ID:</strong> <span id="storeDisplayId">—</span></p>

					<div id="createStoreSection" style="display:none;">
						<div class="form-field">
							<label for="storeName">Create Store Name</label>
							<input type="text" id="storeName" placeholder="Enter store name">
						</div>
						<button class="action-btn" onclick="createStore()">Create Store</button>
					</div>

					<div id="editStoreSection" style="display:none; margin-top:14px;">
						<div class="form-field">
							<label for="editStoreName">Edit Store Name</label>
							<input type="text" id="editStoreName" placeholder="Enter new store name">
						</div>
						<button class="action-btn" type="button" onclick="updateStoreName()">Update Name</button>
					</div>
				</div>
			</div>

			<!-- ADD PRODUCT -->
			<div class="panel-card">
				<div class="panel-card__header">
					<h2>Add Product</h2>
				</div>

				<div class="panel-card__body">

					<!-- 🔥 FORM START -->
					<form id="productForm" enctype="multipart/form-data">

						<div class="form-field">
							<label for="pname">Product Name</label>
							<input type="text" id="pname" placeholder="e.g., Milk, Rice, Sugar" maxlength="40" required>
							<div class="field-error" id="pnameError"></div>
						</div>

						<div class="form-field">
							<label for="pdescription">Product Description</label>
							<textarea id="pdescription" placeholder="e.g., Fresh Vegetables for healthy eating" maxlength="120" rows="3" required></textarea>
							<div class="field-error" id="pdescriptionError"></div>
						</div>

						<div class="form-grid">
							<div class="form-field">
								<label for="pprice">Price (₹)</label>
								<input type="number" id="pprice" placeholder="e.g., 60" min="0.01" step="0.01" required>
								<div class="field-error" id="ppriceError"></div>
							</div>

							<div class="form-field">
								<label for="pquantity">Quantity</label>
								<input type="number" id="pquantity" placeholder="e.g., 1" min="0.01" step="0.01" required>
								<div class="field-error" id="pquantityError"></div>
							</div>

							<div class="form-field">
								<label for="punit">Unit</label>
								<select id="punit" required>
									<option value="kg">Kg</option>
									<option value="g">Gram</option>
									<option value="litre">Litre</option>
									<option value="ml">ML</option>
									<option value="piece">Piece</option>
									<option value="pack">Pack</option>
								</select>
								<div class="field-error" id="punitError"></div>
							</div>
						</div>

						<!-- 🔥 NEW IMAGE FIELD -->
						<div class="form-field">
							<label for="pimage">Product Image</label>
							<input type="file" id="pimage" accept="image/*">
						</div>

						<button id="addProductBtn" class="action-btn" type="submit">
    					Add Product
						</button>

					</form>
					<!-- 🔥 FORM END -->

				</div>
			</div>

			<!-- DELIVERY SETTINGS -->
			<div class="panel-card delivery-panel">
				<div class="panel-card__header">
					<h2>Delivery Settings</h2>
					<p class="help-text" style="margin:8px 0 0;">These settings are shown to customers during checkout.</p>
				</div>
				<div class="panel-card__body">
					<!-- SAME AS BEFORE (NO CHANGE) -->
					<div class="delivery-settings">
						<div class="delivery-settings__row">

							<div class="delivery-settings__toggles">
								<label class="option-chip">
									<input type="radio" name="fulfillmentMethod" value="delivery" checked>
									<span>Delivery Available</span>
								</label>
								<label class="option-chip">
									<input type="radio" name="fulfillmentMethod" value="pickup">
									<span>Pickup Available</span>
								</label>
							</div>

							<div class="delivery-settings__grid">
								<div class="form-field">
									<label for="deliveryCharge">Delivery Charge (₹)</label>
									<input type="number" id="deliveryCharge">
								</div>
								<div class="form-field">
									<label for="minOrder">Free Delivery above (₹)</label>
									<input type="number" id="minOrder">
								</div>
							</div>

							<button class="action-btn" type="button" onclick="saveDeliverySettings()">Save Settings</button>

						</div>

						<div class="slot-manager">
							<h3>Pickup Time Slots</h3>
							<div class="form-field">
								<input type="text" id="slotTimeInput" placeholder="e.g., 05:00 PM - 07:00 PM">
							</div>
							<button class="action-btn" onclick="addTimeSlot()">Add Slot</button>
							<div id="slotList"></div>
						</div>

					</div>
				</div>
			</div>

		</section>

		<!-- PRODUCTS -->
		<section style="margin-top:26px;">
			<h2 style="margin:0 0 12px; color:#222;">My Products</h2>
			<div class="store-container" id="ownerProductList"></div>
		</section>

	<p id="msg"></p>
</main>

<script src="owner.js"></script>

</body>
</html>
